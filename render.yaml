services:
  - type: web
    name: Voice-Enabled-AI-Agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health